name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CORE=$(grep '^version' crates/core/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CLI=$(grep '^version' crates/cli/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PKG=$(jq -r .version package.json)
          TAURI=$(jq -r .version src-tauri/tauri.conf.json)
          echo "Tag:                       $VERSION"
          echo "src-tauri/Cargo.toml:      $CARGO"
          echo "crates/core/Cargo.toml:    $CORE"
          echo "crates/cli/Cargo.toml:     $CLI"
          echo "package.json:              $PKG"
          echo "tauri.conf.json:           $TAURI"
          if [ "$CARGO" != "$VERSION" ] || [ "$CORE" != "$VERSION" ] || [ "$CLI" != "$VERSION" ] || [ "$PKG" != "$VERSION" ] || [ "$TAURI" != "$VERSION" ]; then
            echo "ERROR: Version mismatch — bump all five Rust/version files before tagging."
            exit 1
          fi
          echo "All versions match $VERSION"

  release:
    needs: check-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Set up signing key
        shell: bash
        run: |
          printf '%s' "$TAURI_KEY" | tr -d '\r' > "$RUNNER_TEMP/tauri_signing_key"
          echo "TAURI_SIGNING_PRIVATE_KEY=$RUNNER_TEMP/tauri_signing_key" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_KEY_PASSWORD" >> "$GITHUB_ENV"
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found && NF{print}" CHANGELOG.md)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            echo "ERROR: No CHANGELOG entry found for version $VERSION. Add a '## [$VERSION]' section to CHANGELOG.md before tagging."
            exit 1
          fi
          echo "body<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQLX_OFFLINE: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cubelit ${{ github.ref_name }}'
          releaseBody: '${{ steps.changelog.outputs.body }}'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  build-cli:
    needs: [check-version, release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact: cubelit-cli-linux
            src: target/release/cubelit
          - platform: macos-latest
            artifact: cubelit-cli-macos
            src: target/release/cubelit
          - platform: windows-latest
            artifact: cubelit-cli-windows.exe
            src: target/release/cubelit.exe
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build CLI
        run: cargo build --release -p cubelit-cli
        env:
          SQLX_OFFLINE: "true"

      - name: Rename binary
        shell: bash
        run: mv "${{ matrix.src }}" "${{ matrix.artifact }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
