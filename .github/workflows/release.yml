name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PKG=$(jq -r .version package.json)
          TAURI=$(jq -r .version src-tauri/tauri.conf.json)
          echo "Tag:             $VERSION"
          echo "Cargo.toml:      $CARGO"
          echo "package.json:    $PKG"
          echo "tauri.conf.json: $TAURI"
          if [ "$CARGO" != "$VERSION" ] || [ "$PKG" != "$VERSION" ] || [ "$TAURI" != "$VERSION" ]; then
            echo "ERROR: Version mismatch — bump all three files before tagging."
            exit 1
          fi
          echo "All versions match $VERSION"

  release:
    needs: check-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Set up signing key
        shell: bash
        run: |
          printf '%s' "$TAURI_KEY" | tr -d '\r' > "$RUNNER_TEMP/tauri_signing_key"
          echo "TAURI_SIGNING_PRIVATE_KEY=$RUNNER_TEMP/tauri_signing_key" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_KEY_PASSWORD" >> "$GITHUB_ENV"
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQLX_OFFLINE: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cubelit ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See the assets below to download and install Cubelit.

            **Requires Docker Desktop to be installed and running.**
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
