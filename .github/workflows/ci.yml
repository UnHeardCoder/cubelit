name: CI

on:
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'static/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/ci.yml'
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'static/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/ci.yml'

jobs:
  ci:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri
        env:
          SQLX_OFFLINE: "true"

      - name: Cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
        env:
          SQLX_OFFLINE: "true"

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri
        env:
          SQLX_OFFLINE: "true"

      - name: Frontend type-check
        run: bun run check

      - name: Frontend tests
        run: bun run test
