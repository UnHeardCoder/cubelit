name: Deploy Website

on:
  push:
    tags: ['v*']
    branches: ['master']
    paths:
      - 'website/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(jq -r .version website/package.json)" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: bun install
        working-directory: website

      - name: Build website
        run: bun run build
        working-directory: website
        env:
          VITE_DOWNLOAD_WINDOWS_URL: https://github.com/UnHeardCoder/cubelit/releases/download/v${{ steps.version.outputs.VERSION }}/Cubelit_${{ steps.version.outputs.VERSION }}_x64-setup.exe
          VITE_DOWNLOAD_LINUX_URL: https://github.com/UnHeardCoder/cubelit/releases/download/v${{ steps.version.outputs.VERSION }}/Cubelit_${{ steps.version.outputs.VERSION }}_amd64.AppImage

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/unheardcoder/cubelit-website:latest
            ghcr.io/unheardcoder/cubelit-website:${{ github.ref_name }}

      - name: Copy compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: benlundy.com
          username: unheard
          key: ${{ secrets.VPS_SSH_KEY }}
          source: website/deploy/compose.yml
          target: /opt/stacks/cubelit/
          strip_components: 2

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: benlundy.com
          username: unheard
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/stacks/cubelit
            docker compose pull
            docker compose up -d
