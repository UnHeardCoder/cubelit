name: Deploy Website

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: website

      - name: Build website
        run: bun run build
        working-directory: website

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: website
          file: website/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/unheardcoder/cubelit-website:latest
            ghcr.io/unheardcoder/cubelit-website:${{ github.ref_name }}

      - name: Copy compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: benlundy.com
          username: unheard
          key: ${{ secrets.VPS_SSH_KEY }}
          source: website/deploy/compose.yml
          target: /opt/stacks/cubelit/
          strip_components: 2

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: benlundy.com
          username: unheard
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/stacks/cubelit
            docker compose pull
            docker compose up -d
